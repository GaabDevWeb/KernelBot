name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Roda todo dia à meia-noite
  workflow_dispatch: # Permite rodar manualmente
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }} # Você precisará criar esse Token (PAT)
          user: GaabDevWeb
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          
          # Plugins que combinam com seu estilo:
          plugin_lines: yes # Mostra linhas de código escritas
          plugin_habits: yes # Mostra seus horários de maior foco (estilo gráfico de sistema)
          plugin_habits_charts: yes
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_sections: most-used
