name: KernelBot Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:

      # ─── 1. Métricas do repositório ───────────────────────────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          repo: KernelBot
          template: repository
          base: ""

          config_timezone: America/Sao_Paulo

          # Descrição e tópicos do repositório
          plugin_introduction: yes
          plugin_introduction_repository: yes

          # Stack de linguagens (análise profunda do repo)
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 15

          # Volume de código
          plugin_lines: yes

          # Saúde de issues e PRs
          plugin_followup: yes
          plugin_followup_sections: repositories

          # Contribuidores e tipo de contribuição
          plugin_contributors: yes
          plugin_contributors_contributions: yes

          # Licença do repositório
          plugin_licenses: yes

          # Tráfego: views e clones (requer scope "repo" no token)
          plugin_traffic: yes

          # Crescimento de stars ao longo do tempo
          plugin_stargazers: yes

          # Calendário isométrico de commits (ano completo)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          filename: kernel-status.svg
          output_action: commit
          committer_branch: main

      # ─── 2. GitHub Skyline 2025 ───────────────────────────────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""

          config_timezone: America/Sao_Paulo

          plugin_skyline: yes
          plugin_skyline_year: 2025
          plugin_skyline_frames: 6
          plugin_skyline_quality: 1

          filename: kernel-skyline-2025.svg
          output_action: commit
          committer_branch: main

      # ─── 3. GitHub Skyline 2026 ───────────────────────────────────────────
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          template: classic
          base: ""

          config_timezone: America/Sao_Paulo

          plugin_skyline: yes
          plugin_skyline_year: 2026
          plugin_skyline_frames: 6
          plugin_skyline_quality: 1

          filename: kernel-skyline-2026.svg
          output_action: commit
          committer_branch: main
