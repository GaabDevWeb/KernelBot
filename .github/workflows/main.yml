name: KernelBot Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          committer_token: ${{ secrets.METRICS_TOKEN }}
          user: GaabDevWeb
          repo: KernelBot
          template: classic
          
          # Ajuste de base para garantir a geração do arquivo
          base: repositories
          base_setup: yes
          base_repositories: no
          
          config_timezone: America/Sao_Paulo
          config_twotone: yes
          
          # Plugins solicitados
          plugin_languages: yes
          plugin_languages_details: lines, percentage
          plugin_languages_indepth: yes
          
          plugin_followup: yes
          plugin_followup_sections: repositories
          
          plugin_lines: yes
          
          plugin_traffic: yes

          # Configurações de Output e Commit
          filename: kernel-status.svg
          output_action: commit
          committer_branch: main # <--- Certifique-se que sua branch é main ou master
