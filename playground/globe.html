<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kernel — Globe sandbox</title>
  <link rel="stylesheet" href="/assets/css/entrance.css" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #08080a; }
    .dev-panel {
      position: fixed; bottom: 16px; left: 16px; z-index: 10;
      font: 12px/1.4 ui-monospace, monospace; color: rgba(255,255,255,.55);
      background: rgba(12,12,14,.82); border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px; padding: 10px 12px; max-width: 280px;
      pointer-events: none; opacity: 0; transition: opacity .2s;
    }
    .dev-panel.is-visible { opacity: 1; pointer-events: auto; }
    .dev-panel kbd { display: inline-block; min-width: 1.4em; padding: 0 4px; border-radius: 3px; background: rgba(255,255,255,.08); text-align: center; }
    .dev-panel p + p { margin-top: 4px; }
  </style>
</head>
<body>
  <canvas id="globe" aria-hidden="true"></canvas>
  <aside class="dev-panel" id="dev-panel" aria-hidden="true">
    <p><strong>Sandbox</strong> — usa <code>frontend/src/globe/</code></p>
    <p>Passe o mouse nas placas · arraste o globo</p>
    <p><kbd>R</kbd> replay &nbsp; <kbd>D</kbd> painel</p>
  </aside>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module">
    import { createLandingGlobeController } from "/src/globe/landingController.js";

    const canvas = document.getElementById("globe");
    const devPanel = document.getElementById("dev-panel");
    const gsap = window.gsap;

    const controller = createLandingGlobeController({
      canvas,
      gsap,
      layout: "sandbox",
      debug: true,
    });

    controller.playEntrance();

    window.addEventListener("resize", () => controller.onResize());

    window.addEventListener("keydown", (e) => {
      if (e.key === "r" || e.key === "R") controller.replayEntrance();
      if (e.key === "d" || e.key === "D") {
        devPanel.classList.toggle("is-visible");
        devPanel.setAttribute("aria-hidden", devPanel.classList.contains("is-visible") ? "false" : "true");
      }
    });
  </script>
</body>
</html>
