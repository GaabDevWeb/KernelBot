<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kernel — Globe sandbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08080a;
    }
    #globe {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    #globe.is-grabbable { cursor: grab; }
    #globe.is-grabbing { cursor: grabbing; }
    /* Painel de dev — oculto por padrão; tecla D alterna */
    .dev-panel {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 10;
      font: 12px/1.4 ui-monospace, "JetBrains Mono", monospace;
      color: rgba(255, 255, 255, 0.55);
      background: rgba(12, 12, 14, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 10px 12px;
      max-width: 280px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .dev-panel.is-visible { opacity: 1; pointer-events: auto; }
    .dev-panel kbd {
      display: inline-block;
      min-width: 1.4em;
      padding: 0 4px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.08);
      text-align: center;
    }
    .dev-panel p + p { margin-top: 4px; }
  </style>
</head>
<body>
  <canvas id="globe" aria-hidden="true"></canvas>

  <aside class="dev-panel" id="dev-panel" aria-hidden="true">
    <p><strong>Sandbox</strong> — edite <code>playground/globe.js</code></p>
    <p>Arraste o globo para rotacionar</p>
    <p><kbd>R</kbd> replay entrada &nbsp; <kbd>1</kbd> hero &nbsp; <kbd>2</kbd> thinking</p>
    <p><kbd>D</kbd> este painel</p>
  </aside>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script type="module">
    import { createGlobe } from "./globe.js";
    import { attachGlobeInteraction } from "./globe-interaction.js";

    const canvas = document.getElementById("globe");
    const devPanel = document.getElementById("dev-panel");

    let variant = "hero";
    let globe = null;
    let interaction = null;
    let idleSpin = null;
    let entranceTl = null;

    const AUTO_SPIN_DURATION = 26;
    const targets = { cx: 0.5, cy: 0.5, scale: 1 };

    function autoSpinOmega() {
      return (Math.PI * 2) / AUTO_SPIN_DURATION;
    }

    function computeTargets() {
      if (variant !== "hero") {
        targets.cx = 0.5;
        targets.cy = 0.5;
        targets.scale = 1;
        return;
      }
      if (window.innerWidth <= 820) {
        targets.cx = 0.5;
        targets.cy = 0.42;
        targets.scale = 0.74;
      } else {
        targets.cx = 0.5;
        targets.cy = 0.5;
        targets.scale = window.innerWidth < 1200 ? 1.1 : 1.35;
      }
    }

    function killIdleSpin() {
      if (idleSpin) idleSpin.kill();
      idleSpin = null;
    }

    function startIdleSpin() {
      if (typeof window.gsap === "undefined" || !globe || variant !== "hero") return;
      killIdleSpin();
      idleSpin = window.gsap.to(globe.state, {
        rotY: "+=" + Math.PI * 2,
        duration: AUTO_SPIN_DURATION,
        ease: "none",
        repeat: -1,
      });
    }

    function killAnimations() {
      if (entranceTl) entranceTl.kill();
      killIdleSpin();
      entranceTl = null;
    }

    function wireInteraction() {
      interaction?.destroy();
      interaction = attachGlobeInteraction(canvas, globe, {
        stopAutoSpin: killIdleSpin,
        startAutoSpin: startIdleSpin,
        getAutoSpinOmega: autoSpinOmega,
      });
      interaction.setEnabled(false);

      window.__globeDebug = {
        get state() { return globe?.state; },
        getMode: () => interaction?.getMode?.() ?? "none",
        isReady: () => interaction?.isReady?.() ?? false,
        hitTest: (x, y) => globe?.hitTest(x, y),
        metrics: () => globe?.globeMetrics?.(),
      };
    }

    function playEntrance() {
      if (typeof window.gsap === "undefined" || !globe) return;
      const gsap = window.gsap;
      const { state, faces } = globe;

      interaction?.setEnabled(false);
      killAnimations();
      computeTargets();

      state.rotY = -0.6;
      state.tilt = variant === "thinking" ? -0.35 : -0.42;
      state.cx = 0.5;
      state.cy = 0.5;
      state.scale = variant === "thinking" ? 0.6 : 0.85;
      for (const f of faces) f.p = 0;

      const reduce = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      entranceTl = gsap.timeline({ defaults: { ease: "power3.out" } });

      entranceTl.to(faces, {
        p: 1,
        duration: 1.1,
        ease: "back.out(1.5)",
        stagger: { each: 0.01, from: "random" },
      }, 0.15);
      entranceTl.to(state, { rotY: "+=0.9", duration: 1.4, ease: "sine.inOut" }, 0.15);
      entranceTl.to(state, { rotY: "+=" + Math.PI * 2, duration: 1.6, ease: "power2.inOut" }, ">-0.2");
      entranceTl.to(state, {
        cx: () => targets.cx,
        cy: () => targets.cy,
        scale: () => targets.scale,
        duration: 1.0,
        ease: "power3.inOut",
      }, "-=0.2");
      entranceTl.add(() => {
        if (variant === "hero") startIdleSpin();
        else globe.setSpinPaused(false);
        interaction?.setEnabled(true);
      });

      if (reduce) {
        entranceTl.progress(1);
        if (variant === "hero") startIdleSpin();
        else globe.setSpinPaused(false);
        interaction?.setEnabled(true);
      }
    }

    function mount(nextVariant) {
      variant = nextVariant;
      killAnimations();
      if (globe) globe.stop();

      globe = createGlobe(canvas, {
        sizeTo: "window",
        variant,
        formed: false,
        spin: variant === "thinking",
        spinSpeed: 0.85,
        particles: variant === "hero",
      });
      globe.setSpinPaused(variant === "thinking");

      wireInteraction();
      playEntrance();
    }

    mount("hero");
    window.addEventListener("resize", () => {
      computeTargets();
      globe?.resize();
    });

    window.addEventListener("keydown", (e) => {
      if (e.target.matches("input, textarea, select")) return;
      if (e.key === "r" || e.key === "R") {
        playEntrance();
      } else if (e.key === "1") {
        mount("hero");
      } else if (e.key === "2") {
        mount("thinking");
      } else if (e.key === "d" || e.key === "D") {
        devPanel.classList.toggle("is-visible");
        devPanel.setAttribute("aria-hidden", devPanel.classList.contains("is-visible") ? "false" : "true");
      }
    });
  </script>
</body>
</html>
