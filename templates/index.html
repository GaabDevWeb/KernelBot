<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kernel — Assistente de Estudo</title>
    <meta name="description" content="Assistente de estudo com busca nas aulas indexadas — Python, SQL, carreira e mais." />
    <meta name="color-scheme" content="dark light" />
    <script>
        (function () {
            try {
                if (localStorage.getItem("kernel-theme") === "light") {
                    document.documentElement.setAttribute("data-theme", "light");
                    document.documentElement.style.colorScheme = "light";
                }
            } catch (_) {}
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet" />

    <link rel="icon" href="/assets/images/icon.png" type="image/png" />
    <link rel="stylesheet" href="/assets/css/output.css" />
    <link rel="stylesheet" href="/assets/css/theme.css" />
    <link rel="stylesheet" href="/assets/css/discipline-panel.css" />
    <link rel="stylesheet" href="/assets/css/entrance.css" />
</head>

<body>
    <a class="skip-link" href="#chat">Ir para o conteúdo principal</a>
    <!-- Full-screen low-poly globe: the entrance backdrop, behind the whole app. -->
    <canvas id="globe" aria-hidden="true"></canvas>

    <div class="app-shell">
        <aside class="conversation-sidebar" id="conversation-sidebar" aria-label="Conversas — Kernel, Assistente de Estudo">
            <header class="conversation-sidebar__brand">
                <button type="button" class="conversation-sidebar__logo-btn" id="sidebar-logo-btn"
                    aria-label="Kernel — Assistente de Estudo">
                    <img class="conversation-sidebar__logo" src="/assets/images/Logo.png" alt=""
                        width="36" height="36" decoding="async" />
                    <img class="conversation-sidebar__logo-hover-icon" src="/assets/images/collapse_expand_icon.svg"
                        alt="" width="16" height="14" decoding="async" aria-hidden="true" />
                    <span class="conversation-sidebar__logo-tooltip">Abrir barra lateral</span>
                </button>
                <button type="button" class="conversation-sidebar__collapse" id="sidebar-collapse-toggle"
                    aria-expanded="true" aria-label="Recolher sidebar" title="Recolher sidebar">
                    <img src="/assets/images/collapse_expand_icon.svg" alt="" width="16" height="14" />
                </button>
            </header>

            <nav class="conversation-sidebar__nav" aria-label="Ações da sidebar">
                <button type="button" class="conversation-sidebar__action-row" id="sidebar-new-chat">
                    <img class="conversation-sidebar__row-icon" src="/assets/images/new_conversation_icon.svg"
                        alt="" width="16" height="16" decoding="async" />
                    <span class="conversation-sidebar__row-label">Nova conversa</span>
                </button>

                <div class="conversation-sidebar__search">
                    <button type="button" class="conversation-sidebar__search-toggle" id="sidebar-search-toggle"
                        aria-label="Pesquisar chats" title="Pesquisar chats">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.2" />
                            <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.2"
                                stroke-linecap="round" />
                        </svg>
                    </button>
                    <label class="conversation-sidebar__search-field">
                        <span class="conversation-sidebar__search-leading" aria-hidden="true">
                            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                                <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.2" />
                                <path d="M10.5 10.5L13 13" stroke="currentColor" stroke-width="1.2"
                                    stroke-linecap="round" />
                            </svg>
                        </span>
                        <input type="search" class="conversation-sidebar__search-input" id="sidebar-search"
                            placeholder="Pesquisar chats" aria-label="Pesquisar chats" autocomplete="off" />
                    </label>
                </div>
            </nav>

            <div class="conversation-sidebar__list" id="conversation-list" role="list"></div>
            <p class="conversation-sidebar__storage-note" id="sidebar-storage-note">
                As conversas ficam salvas só neste navegador. Limpar dados do site ou usar outro dispositivo apaga o histórico.
            </p>
        </aside>
        <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

    <div class="app">

        <header class="header">
            <button type="button" class="header-sidebar-toggle" id="sidebar-toggle" aria-label="Abrir conversas">
                Conversas
            </button>
            <span id="header-conversation-label" class="header-conversation-label" hidden></span>
            <button type="button" class="theme-toggle" id="theme-toggle" title="Alternar tema">
                <svg class="theme-toggle__icon theme-toggle__icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8" />
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
                <svg class="theme-toggle__icon theme-toggle__icon--moon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                    <path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
                </svg>
            </button>
        </header>

        <main class="chat-box" id="chat" role="log" aria-live="polite" aria-label="Histórico de mensagens">
            <div class="empty-state" id="empty-state">
                <!-- Animated title + cycling command suggestion (entrance.js). -->
                <div class="entrance-content">
                    <p class="entrance-eyebrow">KERNEL — ASSISTENTE DE ESTUDO</p>
                    <h1 class="entrance-headline">
                        <span class="entrance-title-text"></span><span class="entrance-caret" aria-hidden="true"></span>
                    </h1>
                    <p class="entrance-subtitle"></p>

                    <div class="entrance-suggestion-wrap">
                        <span class="entrance-suggestion" aria-live="polite" title="Clique para usar esta sugestão">
                            <span class="entrance-suggestion-text"></span><span class="entrance-suggestion-caret" aria-hidden="true"></span>
                        </span>
                    </div>

                    <div class="entrance-discipline-pills" aria-label="Atalhos de disciplinas">
                        <button type="button" class="cmd-pill entrance-cmd-pill" data-cmd="/fluencia-ia">Fluência IA</button>
                        <button type="button" class="cmd-pill entrance-cmd-pill" data-cmd="/python">Python</button>
                        <button type="button" class="cmd-pill entrance-cmd-pill" data-cmd="/projeto-bloco">Projeto Bloco</button>
                        <button type="button" class="cmd-pill entrance-cmd-pill" data-cmd="/sql-modelagem-relacional">SQL</button>
                        <button type="button" class="cmd-pill entrance-cmd-pill" data-cmd="/doc">Documentação</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="input-area entrance-init-hidden">
            <p id="context-window-notice" class="context-window-notice" hidden></p>
            <div class="context-stack" id="context-stack" hidden>
                <div class="silo-pill" id="silo-pill" hidden aria-live="polite"></div>
                <div class="context-pin-badge" id="context-pin-badge" hidden aria-live="polite">
                    <svg class="context-pin-icon" width="14" height="14" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        aria-hidden="true">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <span class="context-pin-label"></span>
                </div>
            </div>

            <div class="input-row">
                <div class="scope-selector" id="scope-selector">
                    <button id="scope-btn" type="button"
                        aria-label="Selecionar matéria da busca" title="Selecionar matéria" aria-haspopup="true"
                        aria-expanded="false">
                        <!-- <svg xmlns="http://www.w3.org/2000/svg" class="size-3.5 rotate-60"
                            viewBox="0 0 576 512">
                            <path fill="rgb(245, 245, 245)"
                                d="M7-25c9.4-9.4 24.6-9.4 33.9 0L569 503c9.4 9.4 9.4 24.6 0 33.9s-24.6 9.4-33.9 0L7 9C-2.3-.4-2.3-15.6 7-25z" />
                        </svg> -->
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
                            <rect x="1" y="1" width="6" height="6" rx="1"/>
                            <rect x="9" y="1" width="6" height="6" rx="1"/>
                            <rect x="1" y="9" width="6" height="6" rx="1"/>
                            <rect x="9" y="9" width="6" height="6" rx="1"/>
                        </svg>
                    </button>

                    <div id="scope-menu" role="menu" aria-labelledby="scope-btn">
                        <div class="scope-menu-inner">
                            <p class="scope-menu-label">Matéria da busca</p>
                            <div id="scope-menu-list"></div>
                        </div>
                    </div>
                </div>

                <div class="composer-wrap" id="composer-wrap">
                <textarea id="message-input" rows="1" placeholder="O que vamos revisar hoje?"
                    autocomplete="off" aria-label="Mensagem"></textarea>
                </div>
                <button type="button" id="send-button" aria-label="Enviar mensagem" title="Enviar (Enter)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 384 512" aria-hidden="true">
                        <path fill="currentColor"
                            d="M214.6 9.4c-12.5-12.5-32.8-12.5-45.3 0l-160 160c-12.5 12.5-12.5 32.8 0 45.3s32.8 12.5 45.3 0L160 109.3 160 480c0 17.7 14.3 32 32 32s32-14.3 32-32l0-370.7 105.4 105.4c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3l-160-160z" />
                    </svg>
                </button>
            </div>
        </footer>

    </div>
    </div>

    <!-- GSAP powers the entrance animation (globe + typed title + pill). -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script type="module" src="/src/entrance.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
